kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: nodehealths.platform.lkhun9311.github.io
spec:
  group: platform.lkhun9311.github.io
  names:
    kind: NodeHealth
    listKind: NodeHealthList
    plural: nodehealths
    singular: nodehealth
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.nodeName
      name: Node
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: NodeHealth is the Schema for the nodehealths API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of NodeHealth
            properties:
              gpuClass:
                description: |-
                  gpuClass is the illustrative GPU class of the node (e.g. "l40s").
                  Locally this is backed by simulated capacity (see the dev runbook).
                type: string
              nodeName:
                description: |-
                  nodeName is the name of the target Node object this resource tracks.
                  It is immutable: a NodeHealth manages the unhealthy taint on exactly one node for its lifetime.
                  Changing it would orphan the taint already applied to the old node, since cleanup only ever targets the node named here.
                type: string
                x-kubernetes-validations:
                - message: nodeName is immutable
                  rule: self == oldSelf
            required:
            - nodeName
            type: object
          status:
            description: status defines the observed state of NodeHealth
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the NodeHealth resource.
                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              faultSignal:
                description: |-
                  faultSignal records the origin of the current fault signal. It is recorded
                  for honesty: locally the signal is simulated, not a real hardware signal.
                properties:
                  code:
                    description: code is an optional fault code.
                    type: string
                  source:
                    description: source is the origin of the signal (e.g. "simulated").
                    type: string
                type: object
              lastTransitionTime:
                description: lastTransitionTime is the time the phase last changed.
                format: date-time
                type: string
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: |-
                  phase is the high-level health state of the node.
                  M3 emits Pending, Ready, and Quarantine.
                  Intake and Degraded are reserved for the node intake and degrade lifecycle stages (see docs/03) and are not emitted yet.
                enum:
