# This rule is not used by the project gpu-platform-control-plane itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the platform.lkhun9311.github.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: gpu-platform-control-plane
    app.kubernetes.io/managed-by: kustomize
  name: nodehealth-editor-role
rules:
- apiGroups:
  - platform.lkhun9311.github.io
  resources:
  - nodehealths
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - platform.lkhun9311.github.io
  resources:
  - nodehealths/status
  verbs:
  - get
